<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taurium</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="toast.css" />
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-toggle" id="sidebar-toggle" role="button" tabindex="0" aria-label="Développer / réduire la barre latérale" aria-expanded="false" title="Développer / réduire">
      <span class="glyph-wrap"><span class="glyph toggle-chevron">&raquo;</span></span>
      <span class="label">Réduire</span>
    </div>

    <!-- Quick switcher (visible when expanded, focus with Ctrl+K) -->
    <div class="sidebar-search" id="sidebar-search-wrap">
      <input type="search" id="sidebar-search" placeholder="Rechercher… (Ctrl+K)" autocomplete="off" aria-label="Rechercher un service" />
    </div>

    <div class="service-list" id="service-list"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">+</div>
      <div class="empty-text">No services</div>
    </div>

    <div class="sidebar-bottom">
      <div class="settings-icon" id="settings-btn" role="button" tabindex="0" aria-label="Settings" title="Settings (Ctrl+,)">
        <span class="glyph-wrap"><span class="glyph">&#9881;</span></span>
        <span class="label">Settings</span>
      </div>
    </div>
  </aside>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
