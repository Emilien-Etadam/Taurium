name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag de version à publier (ex: v0.3.0). Le tag est créé sur la branche sélectionnée s'il n'existe pas."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: ubuntu-22.04
            label: Linux

    name: Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action builds the app, signs the updater artifacts (using the
      # signing secrets below), creates/updates the GitHub release and uploads
      # the installers + the updater manifest (latest.json).
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to sign the updater artifacts. Generate with:
          #   npm run tauri signer generate -- -w taurium.key
          # then add the private key + password as repository secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # inputs.version on manual runs, otherwise the pushed tag.
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "Taurium ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "Téléchargez l'installateur pour votre plateforme ci-dessous."
          # Draft so you can review before publishing. NOTE: the updater endpoint
          # (releases/latest/download/latest.json) only resolves once the release
          # is PUBLISHED, so remember to publish it for auto-updates to work.
          releaseDraft: true
          prerelease: false
          # Generate/attach the updater manifest (latest.json). Default is true
          # when the updater is configured; set explicitly for clarity.
          includeUpdaterJson: true
